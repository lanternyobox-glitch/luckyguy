<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入中...</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e7e7e7;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.03);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    p {
      margin: 0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #333;
    }

    .muted {
      margin-top: 10px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Threads 登入中</h1>
    <p id="msg">登入中...</p>
    <div class="muted">完成後將自動返回首頁</div>
  </div>

  <script>
    const HOME_URL = "https://lanternyobox-glitch.github.io/luckyguy/";
    const EXCHANGE_URL = "https://luckyguy.vercel.app/api/exchange";
    const TOKEN_KEY = "threads_token";
    const USERNAME_KEY = "threads_username";
    const USER_ID_KEY = "threads_user_id";

    function setMsg(text) {
      document.getElementById("msg").innerText = text;
    }

    function clearAuthStorage() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USERNAME_KEY);
      localStorage.removeItem(USER_ID_KEY);
    }

    async function fetchProfile(token) {
      const url = `https://graph.threads.net/v1.0/me?fields=id,username&access_token=${encodeURIComponent(token)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok || data.error) {
        throw new Error(data?.error?.message || "讀取帳號資訊失敗");
      }

      return data;
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (!code) {
        clearAuthStorage();
        setMsg("沒有取得授權 code，請重新登入或洽開發者");
        return;
      }

      setMsg("正在交換登入憑證...");

      try {
        const res = await fetch(EXCHANGE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ code })
        });

        const data = await res.json();
        console.log("exchange result:", data);

        if (!res.ok || !data.access_token) {
          clearAuthStorage();
          setMsg("換 token 失敗：\n" + JSON.stringify(data, null, 2));
          return;
        }

        const token = data.access_token;
        localStorage.setItem(TOKEN_KEY, token);

        setMsg("登入成功，正在讀取帳號資訊...");

        try {
          const me = await fetchProfile(token);

          if (me?.username) {
            localStorage.setItem(USERNAME_KEY, me.username);
          }

          if (me?.id) {
            localStorage.setItem(USER_ID_KEY, me.id);
          }

          setMsg(`登入成功\n@${me.username || "未知帳號"} 已登入\n1 秒後返回首頁`);
        } catch (profileErr) {
          console.warn("fetch profile failed:", profileErr);
          setMsg("已取得登入權限，但讀取帳號資訊失敗。\n仍將返回首頁...");
        }

        setTimeout(() => {
          window.location.href = HOME_URL;
        }, 1000);

      } catch (err) {
        clearAuthStorage();
        setMsg("請求失敗：" + err.message);
      }
    }

    run();
  </script>
</body>
</html>
