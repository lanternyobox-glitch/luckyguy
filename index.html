<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threads 抽獎工具</title>

  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    #loginBtn {
      background: #111;
      color: white;
    }

    #showTokenBtn, #logoutBtn {
      background: #f2f2f2;
    }

    pre {
      background: #f8f8f8;
      padding: 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <h1>Threads 抽獎工具</h1>

  <div class="box">
    <button id="loginBtn">登入 Threads</button>
    <button id="showTokenBtn">顯示 Token</button>
    <button id="logoutBtn">清除 Token</button>
  </div>

  <div class="box">
    <pre id="output"></pre>
  </div>

<script>
  // ===== Threads 設定 =====
  const APP_ID = "1586005309177000"; // 🔥 Threads app ID
  const REDIRECT_URI = "https://lanternyobox-glitch.github.io/luckyguy/callback.html";
  const SCOPE = "threads_basic,threads_read_replies";

  const AUTH_URL = "https://threads.net/oauth/authorize";

  const output = document.getElementById("output");

  function log(msg) {
    output.textContent =
      typeof msg === "string" ? msg : JSON.stringify(msg, null, 2);
  }

  function getToken() {
    return localStorage.getItem("threads_token");
  }

  function clearToken() {
    localStorage.removeItem("threads_token");
  }

  function buildLoginUrl() {
    const params = new URLSearchParams({
      client_id: APP_ID,
      redirect_uri: REDIRECT_URI,
      scope: SCOPE,
      response_type: "code"
    });

    return AUTH_URL + "?" + params.toString();
  }

  // ===== 初始化 =====
  function init() {
    const token = getToken();

    if (token) {
      log("✅ 已登入\n\nToken:\n" + token);
    } else {
      log(
        "尚未登入\n\n" +
        "APP_ID: " + APP_ID + "\n" +
        "點擊登入開始 OAuth 流程"
      );
    }
  }

  // ===== 事件 =====
  document.getElementById("loginBtn").onclick = () => {
    const url = buildLoginUrl();
    console.log("LOGIN URL:", url);
    log("跳轉中...\n\n" + url);
    window.location.href = url;
  };

  document.getElementById("showTokenBtn").onclick = () => {
    const token = getToken();
    log(token ? token : "❌ 沒有 token");
  };

  document.getElementById("logoutBtn").onclick = () => {
    clearToken();
    log("已清除 token");
  };

  init();
</script>

</body>
</html>
