<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threads 抽獎工具</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 16px 40px;
      line-height: 1.6;
      background: #fafafa;
      color: #111;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hero,
    .panel {
      background: white;
      border: 1px solid #e7e7e7;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.03);
    }

    .desc {
      color: #555;
      margin-top: 8px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.15s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-primary { background: #111; color: white; }
    .btn-secondary { background: #f1f1f1; color: #111; }
    .btn-success { background: #1f7a3d; color: white; }
    .btn-danger { background: #b42318; color: white; }
    .btn-copy { background: #165dff; color: white; }

    .status {
      padding: 14px 16px;
      border-radius: 14px;
      background: #f7f7f7;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    @media (max-width: 960px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .side-box {
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="number"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d7d7d7;
      margin-bottom: 12px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #333;
    }

    .checkbox-row input {
      margin: 0;
    }

    .reply-list,
    .winner-list {
      margin: 0;
      padding-left: 20px;
    }

    .reply-list li,
    .winner-list li {
      margin-bottom: 8px;
    }

    .winner-box {
      background: #fff8e6;
      border: 1px solid #f2d48d;
      border-radius: 16px;
      padding: 16px;
    }

    .winner-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .tiny {
      font-size: 12px;
      color: #777;
    }

    a {
      color: #0b57d0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .summary-pill {
      background: #f3f3f3;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: #333;
    }

    .post-preview-text {
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .result-card {
      border: 1px dashed #d6b86b;
      background: #fffdf7;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }

    .loading-spinner {
      display: inline-block;
      min-width: 120px;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Threads 抽獎工具</h1>
    <div class="desc">登入後讀取你的貼文，選一篇貼文抓留言，再直接抽出中獎者。</div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <button id="loginBtn" class="btn-primary">登入 Threads</button>
      <button id="getPostsBtn" class="btn-secondary">讀取我的貼文</button>
      <button id="showTokenBtn" class="btn-secondary">查看登入狀態</button>
      <button id="logoutBtn" class="btn-secondary">清除登入</button>
    </div>
  </div>

  <div class="panel">
    <h3>目前狀態</h3>
    <div id="statusBox" class="status">尚未登入</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>我的貼文</h2>

      <div class="side-box">
        <label for="postSelect">選擇貼文</label>
        <select id="postSelect">
          <option value="">請先讀取貼文</option>
        </select>
        <div class="tiny">若 API 有提供置頂欄位，會自動優先列出置頂文。</div>
      </div>

      <div id="postPreviewBox" class="side-box">
        <div class="muted">請先選擇一篇貼文</div>
      </div>
    </div>

    <div class="panel">
      <h2>抽獎面板</h2>

      <div class="side-box">
        <div id="selectedPostTitle" class="muted">尚未選擇貼文</div>
        <div class="summary-row">
          <div class="summary-pill" id="replyCountPill">留言數：0</div>
          <div class="summary-pill" id="eligibleCountPill">符合條件：0</div>
          <div class="summary-pill" id="uniqueCountPill">去重後人數：0</div>
        </div>
      </div>

      <div class="side-box">
        <label for="winnerCount">抽幾位中獎者</label>
        <input id="winnerCount" type="number" min="1" value="1" />

        <label for="keywordInput">關鍵字過濾（可留空，逗號分隔）</label>
        <input id="keywordInput" type="text" placeholder="例如：+1, 報名, 我要參加" />

        <label for="blacklistInput">黑名單帳號（每行一個，不用加 @）</label>
        <textarea id="blacklistInput" placeholder="user_a&#10;user_b"></textarea>

        <div class="checkbox-row">
          <input id="dedupeCheckbox" type="checkbox" checked />
          <label for="dedupeCheckbox" style="margin:0;">同一帳號只算一次</label>
        </div>

        <div class="checkbox-row">
          <input id="mustTagCheckbox" type="checkbox" />
          <label for="mustTagCheckbox" style="margin:0;">留言需包含 @tag 才算</label>
        </div>

        <div class="checkbox-row">
          <input id="excludeEmptyCheckbox" type="checkbox" checked />
          <label for="excludeEmptyCheckbox" style="margin:0;">排除空白留言</label>
        </div>

        <div class="toolbar">
          <button id="drawBtn" class="btn-success">開始抽獎</button>
          <button id="redrawBtn" class="btn-secondary">重抽</button>
          <button id="copyWinnersBtn" class="btn-copy">複製中獎名單</button>
        </div>
      </div>

      <div class="side-box">
        <h3 style="margin-bottom:10px;">留言名單</h3>
        <div id="replyListBox" class="muted">請先選擇貼文並載入留言</div>
      </div>

      <div class="winner-box">
        <div class="winner-title">中獎者</div>
        <div id="winnerBox" class="muted">尚未抽獎</div>
        <div id="resultCard" class="result-card" style="display:none;"></div>
      </div>
    </div>
  </div>

<script>
  const APP_ID = "1586005309177000";
  const REDIRECT_URI = "https://lanternyobox-glitch.github.io/luckyguy/callback.html";
  const SCOPE = "threads_basic,threads_read_replies";
  const AUTH_URL = "https://threads.net/oauth/authorize";
  const API_BASE = "https://luckyguy.vercel.app";

  const statusBox = document.getElementById("statusBox");
  const postSelect = document.getElementById("postSelect");
  const postPreviewBox = document.getElementById("postPreviewBox");
  const replyListBox = document.getElementById("replyListBox");
  const winnerBox = document.getElementById("winnerBox");
  const resultCard = document.getElementById("resultCard");
  const selectedPostTitle = document.getElementById("selectedPostTitle");
  const replyCountPill = document.getElementById("replyCountPill");
  const eligibleCountPill = document.getElementById("eligibleCountPill");
  const uniqueCountPill = document.getElementById("uniqueCountPill");
  const winnerCountInput = document.getElementById("winnerCount");
  const keywordInput = document.getElementById("keywordInput");
  const blacklistInput = document.getElementById("blacklistInput");
  const dedupeCheckbox = document.getElementById("dedupeCheckbox");
  const mustTagCheckbox = document.getElementById("mustTagCheckbox");
  const excludeEmptyCheckbox = document.getElementById("excludeEmptyCheckbox");
  const drawBtn = document.getElementById("drawBtn");
  const redrawBtn = document.getElementById("redrawBtn");
  const copyWinnersBtn = document.getElementById("copyWinnersBtn");

  let postsData = [];
  let selectedPost = null;
  let currentReplies = [];
  let currentEligibleReplies = [];
  let lastWinners = [];

  function setStatus(text) {
    statusBox.textContent = text;
  }

  function getToken() {
    return localStorage.getItem("threads_token");
  }

  function clearToken() {
    localStorage.removeItem("threads_token");
  }

  function buildLoginUrl() {
    const params = new URLSearchParams({
      client_id: APP_ID,
      redirect_uri: REDIRECT_URI,
      scope: SCOPE,
      response_type: "code"
    });
    return AUTH_URL + "?" + params.toString();
  }

  async function proxyGet(path) {
    const token = getToken();

    if (!token) {
      throw new Error("沒有 token，請先登入");
    }

    const res = await fetch(`${API_BASE}/api/proxy`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ path, token })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || data?.error || JSON.stringify(data));
    }

    return data;
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatDate(iso) {
    if (!iso) return "未知時間";
    try {
      return new Date(iso).toLocaleString("zh-TW");
    } catch {
      return iso;
    }
  }

  function truncateText(text, max = 36) {
    const str = String(text || "（沒有文字內容）").replace(/\s+/g, " ").trim();
    return str.length > max ? str.slice(0, max) + "..." : str;
  }

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function sortPosts(posts) {
    return [...posts].sort((a, b) => {
      const aPinned = Number(Boolean(a.is_pinned || a.pinned));
      const bPinned = Number(Boolean(b.is_pinned || b.pinned));

      if (bPinned !== aPinned) return bPinned - aPinned;
      return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
    });
  }

  function parseBlacklist() {
    return blacklistInput.value
      .split("\n")
      .map(v => v.trim().replace(/^@/, "").toLowerCase())
      .filter(Boolean);
  }

  function hasTag(text) {
    return /@\w+/.test(text || "");
  }

  function getKeywordList() {
    return keywordInput.value
      .split(",")
      .map(v => v.trim().toLowerCase())
      .filter(Boolean);
  }

  function applyFilters(replies) {
    const blacklist = parseBlacklist();
    const keywords = getKeywordList();

    return replies.filter(reply => {
      const username = String(reply.username || "").toLowerCase();
      const text = String(reply.text || "").trim();
      const textLower = text.toLowerCase();

      if (blacklist.includes(username)) return false;
      if (excludeEmptyCheckbox.checked && !text) return false;
      if (mustTagCheckbox.checked && !hasTag(text)) return false;
      if (keywords.length > 0 && !keywords.some(k => textLower.includes(k))) return false;

      return true;
    });
  }

  function updateCounts(allReplies, eligibleReplies) {
    const uniqueUsers = [...new Set(eligibleReplies.map(r => r.username).filter(Boolean))];
    replyCountPill.textContent = `留言數：${allReplies.length}`;
    eligibleCountPill.textContent = `符合條件：${eligibleReplies.length}`;
    uniqueCountPill.textContent = `去重後人數：${uniqueUsers.length}`;
  }

  function renderPostSelect(posts) {
    if (!posts.length) {
      postSelect.innerHTML = `<option value="">沒有抓到貼文</option>`;
      return;
    }

    postSelect.innerHTML = `
      <option value="">請選擇貼文</option>
      ${posts.map(post => {
        const isPinned = post.is_pinned || post.pinned;
        const prefix = isPinned ? "📌 " : "";
        const label = `${prefix}[${formatDate(post.timestamp)}] ${truncateText(post.text, 40)}`;
        return `<option value="${post.id}">${escapeHtml(label)}</option>`;
      }).join("")}
    `;
  }

  function renderPostPreview(post, replyCount = null) {
    if (!post) {
      postPreviewBox.innerHTML = `<div class="muted">請先選擇一篇貼文</div>`;
      return;
    }

    postPreviewBox.innerHTML = `
      <div class="meta">發文時間：${escapeHtml(formatDate(post.timestamp))}</div>
      <div class="post-preview-text">${escapeHtml(post.text || "（沒有文字內容）")}</div>
      <div class="summary-row">
        <div class="summary-pill">貼文 ID：${escapeHtml(post.id)}</div>
        <div class="summary-pill">預估留言數：${replyCount == null ? "尚未讀取" : replyCount}</div>
      </div>
      <div class="toolbar" style="margin-top:12px;">
        <a class="btn-secondary" href="${escapeHtml(post.permalink || "#")}" target="_blank" style="display:inline-block;text-decoration:none;">開啟原文</a>
        <button class="btn-secondary" onclick="loadReplies('${post.id}')">載入留言</button>
      </div>
    `;
  }

  function renderReplyList(replies) {
    if (!replies.length) {
      replyListBox.innerHTML = `<div class="muted">目前沒有符合條件的留言</div>`;
      return;
    }

    replyListBox.innerHTML = `
      <ol class="reply-list">
        ${replies.map(reply => `
          <li>
            <strong>@${escapeHtml(reply.username || "未知帳號")}</strong>
            ${reply.text ? `：${escapeHtml(reply.text)}` : "：（無文字）"}
          </li>
        `).join("")}
      </ol>
    `;
  }

  function renderWinners(winners) {
    if (!winners.length) {
      winnerBox.innerHTML = `<div class="muted">沒有抽出中獎者</div>`;
      resultCard.style.display = "none";
      return;
    }

    winnerBox.innerHTML = `
      <ol class="winner-list">
        ${winners.map(name => `<li><strong>@${escapeHtml(name)}</strong></li>`).join("")}
      </ol>
    `;

    const postPreview = (selectedPost?.text || "（沒有文字內容）").slice(0, 50);
    const keywordText = keywordInput.value.trim() || "無";
    const mustTagText = mustTagCheckbox.checked ? "是" : "否";
    const dedupeText = dedupeCheckbox.checked ? "是" : "否";

    resultCard.innerHTML = `
      <div><strong>抽獎結果</strong></div>
      <div class="tiny" style="margin-top:6px;">貼文：${escapeHtml(postPreview)}</div>
      <div class="tiny">時間：${escapeHtml(formatDate(new Date().toISOString()))}</div>
      <div class="tiny">條件：關鍵字=${escapeHtml(keywordText)}｜需Tag=${mustTagText}｜去重=${dedupeText}</div>
      <div style="margin-top:10px;"><strong>中獎名單：</strong>${winners.map(w => `@${escapeHtml(w)}`).join("、")}</div>
      <div class="tiny" style="margin-top:8px;">由 Threads 抽獎工具產生</div>
    `;
    resultCard.style.display = "block";
  }

  async function getAllPosts() {
    const fields = "id,text,username,permalink,media_type,media_url,timestamp,shortcode,is_pinned,pinned";
    let after = "";
    let allPosts = [];
    let page = 0;

    while (true) {
      page += 1;
      setStatus(`正在讀取貼文... 第 ${page} 頁，目前已抓到 ${allPosts.length} 篇`);

      const path = after
        ? `me/threads?fields=${fields}&after=${encodeURIComponent(after)}`
        : `me/threads?fields=${fields}`;

      const data = await proxyGet(path);
      const batch = data.data || [];
      allPosts = allPosts.concat(batch);

      const nextAfter = data?.paging?.cursors?.after;
      if (!nextAfter || batch.length === 0) {
        break;
      }

      after = nextAfter;
    }

    return sortPosts(allPosts);
  }

  async function getPosts() {
    const posts = await getAllPosts();
    postsData = posts;
    renderPostSelect(postsData);
    renderPostPreview(null);
    setStatus(`已讀取 ${postsData.length} 篇貼文`);
  }

  async function getPostDetail(postId) {
    try {
      return await proxyGet(`${postId}?fields=id,text,permalink,timestamp,reply_count`);
    } catch {
      return null;
    }
  }

  async function getAllReplies(postId) {
    const fields = "id,text,username,media_type,timestamp,permalink";
    let after = "";
    let allReplies = [];
    let page = 0;
    let estimatedTotal = null;
    let estimatedPages = null;

    const detail = await getPostDetail(postId);

    if (detail && typeof detail.reply_count === "number") {
      estimatedTotal = detail.reply_count;
      estimatedPages = Math.max(1, Math.ceil(estimatedTotal / 25));

      if (selectedPost && selectedPost.id === postId) {
        selectedPost.reply_count = estimatedTotal;
        renderPostPreview(selectedPost, estimatedTotal);
      }
    }

    while (true) {
      page += 1;

      if (estimatedPages) {
        setStatus(`正在載入留言... 第 ${page}/${estimatedPages} 頁，已抓到 ${allReplies.length} 則`);
      } else {
        setStatus(`正在載入留言... 第 ${page} 頁，已抓到 ${allReplies.length} 則`);
      }

      const path = after
        ? `${postId}/replies?fields=${fields}&after=${encodeURIComponent(after)}`
        : `${postId}/replies?fields=${fields}`;

      const data = await proxyGet(path);
      const batch = data.data || [];
      allReplies = allReplies.concat(batch);

      const nextAfter = data?.paging?.cursors?.after;
      if (!nextAfter || batch.length === 0) {
        break;
      }

      after = nextAfter;
    }

    return {
      replies: allReplies,
      estimatedTotal,
      estimatedPages
    };
  }

  function buildPool() {
    currentEligibleReplies = applyFilters(currentReplies);
    updateCounts(currentReplies, currentEligibleReplies);
    renderReplyList(currentEligibleReplies);

    if (dedupeCheckbox.checked) {
      return [...new Set(currentEligibleReplies.map(r => r.username).filter(Boolean))];
    }

    return currentEligibleReplies.map(r => r.username).filter(Boolean);
  }

  async function runDrawAnimation() {
    drawBtn.disabled = true;
    redrawBtn.disabled = true;
    copyWinnersBtn.disabled = true;

    const steps = ["抽獎中.", "抽獎中..", "抽獎中..."];

    for (let i = 0; i < 6; i++) {
      winnerBox.innerHTML = `<div class="loading-spinner">${steps[i % steps.length]}</div>`;
      await new Promise(resolve => setTimeout(resolve, 220));
    }

    drawBtn.disabled = false;
    redrawBtn.disabled = false;
    copyWinnersBtn.disabled = false;
  }

  async function drawWinners(isRedraw = false) {
    if (!selectedPost) {
      setStatus("請先選擇一篇貼文");
      return;
    }

    if (!currentReplies.length) {
      setStatus("請先載入這篇貼文的留言");
      return;
    }

    const winnerCount = parseInt(winnerCountInput.value, 10);

    if (!winnerCount || winnerCount < 1) {
      setStatus("請輸入正確的中獎人數");
      return;
    }

    const pool = buildPool();

    if (!pool.length) {
      setStatus("符合條件的名單為空，無法抽獎");
      renderWinners([]);
      return;
    }

    await runDrawAnimation();

    const winners = shuffle(pool).slice(0, Math.min(winnerCount, pool.length));
    lastWinners = winners;
    renderWinners(winners);

    setStatus(
      `${isRedraw ? "重抽完成" : "抽獎完成"}\n` +
      `貼文：${(selectedPost.text || "（沒有文字內容）").slice(0, 30)}\n` +
      `母池人數：${pool.length}\n` +
      `抽出 ${winners.length} 位中獎者`
    );
  }

  async function copyWinners() {
    if (!lastWinners.length) {
      setStatus("目前沒有可複製的中獎名單");
      return;
    }

    const text = lastWinners.map((name, i) => `${i + 1}. @${name}`).join("\n");

    try {
      await navigator.clipboard.writeText(text);
      setStatus("已複製中獎名單");
    } catch {
      setStatus("複製失敗，可能是瀏覽器權限限制");
    }
  }

  window.selectPost = function(postId) {
    selectedPost = postsData.find(p => p.id === postId) || null;
    currentReplies = [];
    currentEligibleReplies = [];
    lastWinners = [];
    renderReplyList([]);
    renderWinners([]);
    updateCounts([], []);

    if (!selectedPost) {
      selectedPostTitle.textContent = "尚未選擇貼文";
      renderPostPreview(null);
      return;
    }

    selectedPostTitle.textContent = `目前選擇：${(selectedPost.text || "（沒有文字內容）").slice(0, 60)}`;
    renderPostPreview(selectedPost, selectedPost.reply_count ?? null);
    setStatus("已選擇貼文，可載入留言");
  };

  window.loadReplies = async function(postId) {
    try {
      if (!selectedPost || selectedPost.id !== postId) {
        window.selectPost(postId);
      }

      const result = await getAllReplies(postId);

      currentReplies = result.replies || [];
      currentEligibleReplies = applyFilters(currentReplies);

      updateCounts(currentReplies, currentEligibleReplies);
      renderReplyList(currentEligibleReplies);
      renderWinners([]);

      const totalText = result.estimatedTotal != null
        ? `（預估總留言 ${result.estimatedTotal}）`
        : "";

      setStatus(`已載入留言，共 ${currentReplies.length} 則 ${totalText}`);
    } catch (err) {
      setStatus("載入留言失敗：" + err.message);
    }
  };

  function refreshFilteredReplies() {
    if (!currentReplies.length) return;
    currentEligibleReplies = applyFilters(currentReplies);
    updateCounts(currentReplies, currentEligibleReplies);
    renderReplyList(currentEligibleReplies);
  }

  function init() {
    const token = getToken();
    if (token) {
      setStatus("已登入，可先讀取貼文");
    } else {
      setStatus("尚未登入，請先登入 Threads");
    }
  }

  document.getElementById("loginBtn").onclick = () => {
    window.location.href = buildLoginUrl();
  };

  document.getElementById("showTokenBtn").onclick = () => {
    const token = getToken();
    if (token) {
      setStatus("目前已登入，token 已存在瀏覽器");
    } else {
      setStatus("目前沒有 token，請先登入");
    }
  };

  document.getElementById("logoutBtn").onclick = () => {
    clearToken();
    postsData = [];
    selectedPost = null;
    currentReplies = [];
    currentEligibleReplies = [];
    lastWinners = [];

    postSelect.innerHTML = `<option value="">請先讀取貼文</option>`;
    postPreviewBox.innerHTML = `<div class="muted">請先選擇一篇貼文</div>`;
    replyListBox.innerHTML = `<div class="muted">請先選擇貼文並載入留言</div>`;
    winnerBox.innerHTML = `<div class="muted">尚未抽獎</div>`;
    resultCard.style.display = "none";
    selectedPostTitle.textContent = "尚未選擇貼文";
    updateCounts([], []);
    setStatus("已清除登入");
  };

  document.getElementById("getPostsBtn").onclick = async () => {
    try {
      await getPosts();
    } catch (err) {
      setStatus("讀取貼文失敗：" + err.message);
    }
  };

  postSelect.addEventListener("change", (e) => {
    const postId = e.target.value;
    if (!postId) {
      window.selectPost("");
      return;
    }
    window.selectPost(postId);
  });

  drawBtn.onclick = () => drawWinners(false);
  redrawBtn.onclick = () => drawWinners(true);
  copyWinnersBtn.onclick = copyWinners;

  [keywordInput, blacklistInput].forEach(el => {
    el.addEventListener("input", refreshFilteredReplies);
  });

  [dedupeCheckbox, mustTagCheckbox, excludeEmptyCheckbox].forEach(el => {
    el.addEventListener("change", refreshFilteredReplies);
  });

  init();
</script>

</body>
</html>
