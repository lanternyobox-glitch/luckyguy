<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threads 抽獎工具</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
    }

    .desc {
      color: #555;
      margin-bottom: 20px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    #loginBtn {
      background: #111;
      color: white;
    }

    #showTokenBtn, #logoutBtn, #getMeBtn, #getPostsBtn {
      background: #f2f2f2;
      color: #111;
    }

    pre {
      background: #f8f8f8;
      padding: 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
      min-height: 60px;
    }

    .post-item {
      border: 1px solid #e2e2e2;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .post-id {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .post-text {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>Threads 抽獎工具</h1>
  <p class="desc">先登入，再透過 Vercel proxy 抓我的資料、貼文與留言。</p>

  <div class="box">
    <button id="loginBtn">登入 Threads</button>
    <button id="showTokenBtn">顯示 Token</button>
    <button id="logoutBtn">清除 Token</button>
    <button id="getMeBtn">取得我的資料</button>
    <button id="getPostsBtn">取得我的貼文</button>
  </div>

  <div class="box">
    <h3>狀態 / API 回應</h3>
    <pre id="output"></pre>
  </div>

  <div class="box">
    <h3>貼文列表</h3>
    <div id="postsContainer">尚未載入</div>
  </div>

<script>
  const APP_ID = "1586005309177000";
  const REDIRECT_URI = "https://lanternyobox-glitch.github.io/luckyguy/callback.html";
  const SCOPE = "threads_basic,threads_read_replies";
  const AUTH_URL = "https://threads.net/oauth/authorize";
  const API_BASE = "https://luckyguy.vercel.app";

  const output = document.getElementById("output");
  const postsContainer = document.getElementById("postsContainer");

  function log(msg) {
    output.textContent =
      typeof msg === "string" ? msg : JSON.stringify(msg, null, 2);
  }

  function getToken() {
    return localStorage.getItem("threads_token");
  }

  function clearToken() {
    localStorage.removeItem("threads_token");
  }

  function buildLoginUrl() {
    const params = new URLSearchParams({
      client_id: APP_ID,
      redirect_uri: REDIRECT_URI,
      scope: SCOPE,
      response_type: "code"
    });

    return AUTH_URL + "?" + params.toString();
  }

  async function proxyGet(path) {
    const token = getToken();

    if (!token) {
      throw new Error("沒有 token，請先登入");
    }

    const res = await fetch(`${API_BASE}/api/proxy`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        path,
        token
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(JSON.stringify(data, null, 2));
    }

    return data;
  }

  async function getMe() {
    const data = await proxyGet(
      "me?fields=id,username,name,threads_profile_picture_url"
    );
    log(data);
  }

  async function getPosts() {
    const data = await proxyGet(
      "me/threads?fields=id,text,username,permalink,media_type,media_url,timestamp,shortcode"
    );
    log(data);

    const posts = data.data || [];

    if (!posts.length) {
      postsContainer.innerHTML = "沒有抓到貼文";
      return;
    }

    postsContainer.innerHTML = "";

    posts.forEach(post => {
      const div = document.createElement("div");
      div.className = "post-item";

      const text = post.text || "（沒有文字內容）";

      div.innerHTML = `
        <div class="post-id">Post ID: ${escapeHtml(post.id || "")}</div>
        <div class="post-id">username: ${escapeHtml(post.username || "")}</div>
        <div class="post-id">media_type: ${escapeHtml(post.media_type || "")}</div>
        <div class="post-id">time: ${escapeHtml(post.timestamp || "")}</div>
        <div class="post-text">${escapeHtml(text)}</div>
        <div class="post-id">permalink: ${escapeHtml(post.permalink || "")}</div>
        <button onclick="loadReplies('${post.id}')">抓這篇留言</button>
        <button onclick="drawFromReplies('${post.id}')">這篇直接抽獎</button>
        <pre id="replies-${post.id}">尚未載入留言</pre>
      `;

      postsContainer.appendChild(div);
    });
  }

  async function loadReplies(postId) {
    const target = document.getElementById(`replies-${postId}`);
    target.textContent = "載入中...";

    try {
      const data = await proxyGet(
        `${postId}/replies?fields=id,text,username,media_type,timestamp,permalink`
      );
      target.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      target.textContent = "抓留言失敗：\n" + err.message;
    }
  }

  async function drawFromReplies(postId) {
    const countText = prompt("要抽幾位中獎者？", "1");
    const count = parseInt(countText, 10);

    if (!count || count < 1) {
      alert("請輸入正確的抽獎人數");
      return;
    }

    try {
      const data = await proxyGet(
        `${postId}/replies?fields=id,text,username,media_type,timestamp,permalink`
      );

      const replies = data.data || [];

      if (!replies.length) {
        log("這篇目前沒有抓到留言");
        return;
      }

      const usernames = replies
        .map(item => item.username)
        .filter(Boolean);

      const uniqueUsers = [...new Set(usernames)];

      if (!uniqueUsers.length) {
        log("留言裡沒有可抽的 username");
        return;
      }

      const winners = shuffle(uniqueUsers).slice(0, count);

      log({
        postId,
        totalReplies: replies.length,
        totalUniqueUsers: uniqueUsers.length,
        winners
      });

      alert("中獎者：\n" + winners.join("\n"));
    } catch (err) {
      log("抽獎失敗：\n" + err.message);
    }
  }

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function init() {
    const token = getToken();

    if (token) {
      log("✅ 已登入，可開始測 API");
    } else {
      log(
        "尚未登入\n\n" +
        "APP_ID: " + APP_ID + "\n" +
        "REDIRECT_URI: " + REDIRECT_URI + "\n" +
        "API_BASE: " + API_BASE
      );
    }
  }

  document.getElementById("loginBtn").onclick = () => {
    const url = buildLoginUrl();
    window.location.href = url;
  };

  document.getElementById("showTokenBtn").onclick = () => {
    const token = getToken();
    log(token ? token : "❌ 沒有 token");
  };

  document.getElementById("logoutBtn").onclick = () => {
    clearToken();
    log("已清除 token");
    postsContainer.innerHTML = "尚未載入";
  };

  document.getElementById("getMeBtn").onclick = async () => {
    try {
      await getMe();
    } catch (err) {
      log("取得我的資料失敗：\n" + err.message);
    }
  };

  document.getElementById("getPostsBtn").onclick = async () => {
    try {
      await getPosts();
    } catch (err) {
      log("取得貼文失敗：\n" + err.message);
    }
  };

  init();
</script>

</body>
</html>
