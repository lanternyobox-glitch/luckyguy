<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threads 抽獎工具</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px 40px;
      line-height: 1.6;
      background: #fafafa;
      color: #111;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hero {
      background: white;
      border: 1px solid #e7e7e7;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.03);
    }

    .desc {
      color: #555;
      margin: 8px 0 0;
    }

    .panel {
      background: white;
      border: 1px solid #e7e7e7;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.03);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background: #111;
      color: white;
    }

    .btn-secondary {
      background: #f1f1f1;
      color: #111;
    }

    .btn-success {
      background: #1f7a3d;
      color: white;
    }

    .status {
      padding: 14px 16px;
      border-radius: 14px;
      background: #f7f7f7;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .post-card {
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      transition: 0.15s ease;
    }

    .post-card.active {
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(17,17,17,0.06);
    }

    .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .post-text {
      font-size: 15px;
      color: #111;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .side-box {
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d7d7d7;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 14px;
      color: #333;
    }

    .reply-list {
      margin: 0;
      padding-left: 18px;
    }

    .reply-list li {
      margin-bottom: 8px;
    }

    .winner-box {
      background: #fff8e6;
      border: 1px solid #f2d48d;
      border-radius: 16px;
      padding: 16px;
    }

    .winner-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .winner-list {
      margin: 0;
      padding-left: 20px;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    a {
      color: #0b57d0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .summary-pill {
      background: #f3f3f3;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Threads 抽獎工具</h1>
    <div class="desc">登入後讀取你的貼文，選一篇貼文抓留言，再直接抽出中獎者。</div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <button id="loginBtn" class="btn-primary">登入 Threads</button>
      <button id="getPostsBtn" class="btn-secondary">讀取我的貼文</button>
      <button id="showTokenBtn" class="btn-secondary">查看登入狀態</button>
      <button id="logoutBtn" class="btn-secondary">清除登入</button>
    </div>
  </div>

  <div class="panel">
    <h3>目前狀態</h3>
    <div id="statusBox" class="status">尚未登入</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>我的貼文</h2>
      <div id="postsContainer" class="post-list">
        <div class="muted">尚未載入貼文</div>
      </div>
    </div>

    <div class="panel">
      <h2>抽獎面板</h2>

      <div class="side-box">
        <div id="selectedPostTitle" class="muted">尚未選擇貼文</div>
        <div class="summary-row">
          <div class="summary-pill" id="replyCountPill">留言數：0</div>
          <div class="summary-pill" id="uniqueCountPill">去重後人數：0</div>
        </div>
      </div>

      <div class="side-box">
        <label for="winnerCount">抽幾位中獎者</label>
        <input id="winnerCount" type="number" min="1" value="1" />

        <div class="checkbox-row">
          <input id="dedupeCheckbox" type="checkbox" checked />
          <label for="dedupeCheckbox" style="margin:0;">同一帳號只算一次</label>
        </div>

        <div class="toolbar">
          <button id="drawBtn" class="btn-success">開始抽獎</button>
        </div>
      </div>

      <div class="side-box">
        <h3 style="margin-bottom:10px;">留言名單</h3>
        <div id="replyListBox" class="muted">請先選擇貼文並載入留言</div>
      </div>

      <div class="winner-box">
        <div class="winner-title">中獎者</div>
        <div id="winnerBox" class="muted">尚未抽獎</div>
      </div>
    </div>
  </div>

<script>
  const APP_ID = "1586005309177000";
  const REDIRECT_URI = "https://lanternyobox-glitch.github.io/luckyguy/callback.html";
  const SCOPE = "threads_basic,threads_read_replies";
  const AUTH_URL = "https://threads.net/oauth/authorize";
  const API_BASE = "https://luckyguy.vercel.app";

  const statusBox = document.getElementById("statusBox");
  const postsContainer = document.getElementById("postsContainer");
  const replyListBox = document.getElementById("replyListBox");
  const winnerBox = document.getElementById("winnerBox");
  const selectedPostTitle = document.getElementById("selectedPostTitle");
  const replyCountPill = document.getElementById("replyCountPill");
  const uniqueCountPill = document.getElementById("uniqueCountPill");
  const winnerCountInput = document.getElementById("winnerCount");
  const dedupeCheckbox = document.getElementById("dedupeCheckbox");

  let postsData = [];
  let selectedPost = null;
  let currentReplies = [];

  function setStatus(text) {
    statusBox.textContent = text;
  }

  function getToken() {
    return localStorage.getItem("threads_token");
  }

  function clearToken() {
    localStorage.removeItem("threads_token");
  }

  function buildLoginUrl() {
    const params = new URLSearchParams({
      client_id: APP_ID,
      redirect_uri: REDIRECT_URI,
      scope: SCOPE,
      response_type: "code"
    });
    return AUTH_URL + "?" + params.toString();
  }

  async function proxyGet(path) {
    const token = getToken();

    if (!token) {
      throw new Error("沒有 token，請先登入");
    }

    const res = await fetch(`${API_BASE}/api/proxy`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ path, token })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || data?.error || JSON.stringify(data));
    }

    return data;
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatDate(iso) {
    if (!iso) return "未知時間";
    try {
      return new Date(iso).toLocaleString("zh-TW");
    } catch {
      return iso;
    }
  }

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function renderPosts(posts) {
    if (!posts.length) {
      postsContainer.innerHTML = `<div class="muted">沒有抓到貼文</div>`;
      return;
    }

    postsContainer.innerHTML = "";

    posts.forEach(post => {
      const div = document.createElement("div");
      div.className = "post-card";
      div.id = `post-card-${post.id}`;

      const text = post.text || "（沒有文字內容）";

      div.innerHTML = `
        <div class="meta">發文時間：${escapeHtml(formatDate(post.timestamp))}</div>
        <div class="post-text">${escapeHtml(text)}</div>
        <div class="meta">貼文連結：<a href="${escapeHtml(post.permalink || "#")}" target="_blank">開啟原文</a></div>
        <div class="card-actions">
          <button class="btn-secondary" onclick="selectPost('${post.id}')">選擇這篇</button>
          <button class="btn-secondary" onclick="loadReplies('${post.id}')">載入留言</button>
        </div>
      `;

      postsContainer.appendChild(div);
    });
  }

  function updateSelectedCard(postId) {
    document.querySelectorAll(".post-card").forEach(el => el.classList.remove("active"));
    const card = document.getElementById(`post-card-${postId}`);
    if (card) card.classList.add("active");
  }

  function renderReplyList(replies) {
    if (!replies.length) {
      replyListBox.innerHTML = `<div class="muted">目前沒有抓到留言</div>`;
      replyCountPill.textContent = "留言數：0";
      uniqueCountPill.textContent = "去重後人數：0";
      return;
    }

    const usernames = replies.map(r => r.username).filter(Boolean);
    const uniqueUsers = [...new Set(usernames)];

    replyCountPill.textContent = `留言數：${replies.length}`;
    uniqueCountPill.textContent = `去重後人數：${uniqueUsers.length}`;

    const html = `
      <ol class="reply-list">
        ${replies.map(reply => `
          <li>
            <strong>@${escapeHtml(reply.username || "未知帳號")}</strong>
            ${reply.text ? `：${escapeHtml(reply.text)}` : "：（無文字）"}
          </li>
        `).join("")}
      </ol>
    `;

    replyListBox.innerHTML = html;
  }

  function renderWinners(winners) {
    if (!winners.length) {
      winnerBox.innerHTML = `<div class="muted">沒有抽出中獎者</div>`;
      return;
    }

    winnerBox.innerHTML = `
      <ol class="winner-list">
        ${winners.map(name => `<li><strong>@${escapeHtml(name)}</strong></li>`).join("")}
      </ol>
    `;
  }

  async function getPosts() {
    setStatus("正在讀取貼文...");
    const data = await proxyGet(
      "me/threads?fields=id,text,username,permalink,media_type,media_url,timestamp,shortcode"
    );

    postsData = data.data || [];
    renderPosts(postsData);
    setStatus(`已讀取 ${postsData.length} 篇貼文`);
  }

  async function getMe() {
    setStatus("正在讀取帳號資料...");
    const data = await proxyGet(
      "me?fields=id,username,name,threads_profile_picture_url"
    );

    const username = data.username ? `@${data.username}` : "未知帳號";
    const name = data.name || "未提供名稱";
    setStatus(`登入成功\n帳號：${username}\n名稱：${name}`);
  }

  window.selectPost = function(postId) {
    selectedPost = postsData.find(p => p.id === postId) || null;
    updateSelectedCard(postId);
    currentReplies = [];
    renderReplyList([]);
    renderWinners([]);

    if (!selectedPost) {
      selectedPostTitle.textContent = "尚未選擇貼文";
      return;
    }

    selectedPostTitle.textContent = `目前選擇：${(selectedPost.text || "（沒有文字內容）").slice(0, 60)}`;
    setStatus("已選擇貼文，接著可載入留言或直接抽獎");
  };

  window.loadReplies = async function(postId) {
    try {
      if (!selectedPost || selectedPost.id !== postId) {
        window.selectPost(postId);
      }

      setStatus("正在載入留言...");
      const data = await proxyGet(
        `${postId}/replies?fields=id,text,username,media_type,timestamp,permalink`
      );

      currentReplies = data.data || [];
      renderReplyList(currentReplies);
      setStatus(`已載入留言，共 ${currentReplies.length} 則`);
    } catch (err) {
      setStatus("載入留言失敗：" + err.message);
    }
  };

  function drawWinners() {
    if (!selectedPost) {
      setStatus("請先選擇一篇貼文");
      return;
    }

    if (!currentReplies.length) {
      setStatus("請先載入這篇貼文的留言");
      return;
    }

    const winnerCount = parseInt(winnerCountInput.value, 10);

    if (!winnerCount || winnerCount < 1) {
      setStatus("請輸入正確的中獎人數");
      return;
    }

    let pool = [];

    if (dedupeCheckbox.checked) {
      pool = [...new Set(currentReplies.map(r => r.username).filter(Boolean))];
    } else {
      pool = currentReplies.map(r => r.username).filter(Boolean);
    }

    if (!pool.length) {
      setStatus("留言名單為空，無法抽獎");
      return;
    }

    const winners = shuffle(pool).slice(0, Math.min(winnerCount, pool.length));
    renderWinners(winners);

    setStatus(
      `抽獎完成\n` +
      `貼文：${(selectedPost.text || "（沒有文字內容）").slice(0, 30)}\n` +
      `抽出 ${winners.length} 位中獎者`
    );
  }

  function init() {
    const token = getToken();
    if (token) {
      setStatus("已登入，可先讀取帳號資料或貼文");
    } else {
      setStatus("尚未登入，請先登入 Threads");
    }
  }

  document.getElementById("loginBtn").onclick = () => {
    window.location.href = buildLoginUrl();
  };

  document.getElementById("showTokenBtn").onclick = () => {
    const token = getToken();
    if (token) {
      setStatus("目前已登入，token 已存在瀏覽器");
    } else {
      setStatus("目前沒有 token，請先登入");
    }
  };

  document.getElementById("logoutBtn").onclick = () => {
    clearToken();
    postsData = [];
    selectedPost = null;
    currentReplies = [];
    postsContainer.innerHTML = `<div class="muted">尚未載入貼文</div>`;
    replyListBox.innerHTML = `<div class="muted">請先選擇貼文並載入留言</div>`;
    winnerBox.innerHTML = `<div class="muted">尚未抽獎</div>`;
    selectedPostTitle.textContent = "尚未選擇貼文";
    replyCountPill.textContent = "留言數：0";
    uniqueCountPill.textContent = "去重後人數：0";
    setStatus("已清除登入");
  };

  document.getElementById("getPostsBtn").onclick = async () => {
    try {
      await getPosts();
    } catch (err) {
      setStatus("讀取貼文失敗：" + err.message);
    }
  };

  document.getElementById("getMeBtn").onclick = async () => {
    try {
      await getMe();
    } catch (err) {
      setStatus("讀取帳號資料失敗：" + err.message);
    }
  };

  document.getElementById("drawBtn").onclick = drawWinners;

  init();
</script>

</body>
</html>
